    <rect x="700" y="780" width="3" height="3" />
    <!-- Tower windows -->
    <rect x="780" y="450" width="3" height="3" />
    <rect x="790" y="475" width="3" height="3" />
    <rect x="820" y="500" width="3" height="3" />
    <rect x="850" y="450" width="3" height="3" />
