<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1280 720"
  preserveAspectRatio="xMidYMid slice"
  role="presentation"
  aria-hidden="true"
>
  <defs>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
    <filter id="glow-tiny" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Cyborg red eye — primary focal pulse -->
  <g>
    <circle cx="475" cy="175" r="22" fill="#ff2828" opacity="0.5" filter="url(#glow-strong)">
      <animate attributeName="opacity" values="0.5;0.85;0.5" dur="2.6s" repeatCount="indefinite" />
    </circle>
    <circle cx="475" cy="175" r="10" fill="#ff3838" opacity="0.95" filter="url(#glow-soft)">
      <animate attributeName="opacity" values="0.95;1;0.95" dur="2.6s" repeatCount="indefinite" />
      <animate attributeName="r" values="10;12;10" dur="2.6s" repeatCount="indefinite" />
    </circle>
    <circle cx="475" cy="175" r="3.5" fill="#ffd0c0">
      <animate attributeName="opacity" values="1;0.7;1" dur="2.6s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Cyan circle on cyborg jacket shoulder -->
  <g>
    <circle cx="270" cy="320" r="18" fill="#80f0ff" opacity="0.4" filter="url(#glow-soft)">
      <animate attributeName="opacity" values="0.4;0.65;0.4" dur="3.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="270" cy="320" r="9" fill="#a0f8ff" opacity="0.85" filter="url(#glow-tiny)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.4s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Cyan neon strip on cyborg neck/jacket -->
  <g>
    <rect x="370" y="240" width="100" height="8" rx="2" fill="#80f0ff" opacity="0.5" filter="url(#glow-soft)">
      <animate attributeName="opacity" values="0.5;0.75;0.5;0.55;0.5" dur="4.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Wall reflection of the cyan light (behind cyborg, left wall) -->
  <ellipse cx="135" cy="320" rx="55" ry="80" fill="#80f0ff" opacity="0.18" filter="url(#glow-strong)">
    <animate attributeName="opacity" values="0.18;0.32;0.18;0.20;0.18" dur="4.8s" repeatCount="indefinite" />
  </ellipse>

  <!-- Vertical neon billboard sign on central building (orange/yellow) -->
  <rect x="877" y="195" width="6" height="100" fill="#ffb060" opacity="0.6" filter="url(#glow-soft)">
    <animate attributeName="opacity" values="0.6;0.85;0.6" dur="2.2s" repeatCount="indefinite" />
  </rect>

  <!-- Right side multi-color billboard (purple/violet vertical strip) -->
  <rect x="1080" y="380" width="40" height="160" fill="#c060ff" opacity="0.25" filter="url(#glow-soft)">
    <animate attributeName="opacity" values="0.25;0.45;0.25" dur="3.7s" repeatCount="indefinite" />
  </rect>

  <!-- Far-right tower red dot pulse -->
  <circle cx="1078" cy="92" r="3" fill="#ff4040">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1078" cy="92" r="8" fill="#ff4040" opacity="0.5" filter="url(#glow-tiny)">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="1.8s" repeatCount="indefinite" />
  </circle>

  <!-- Flying car headlights top -->
  <ellipse cx="843" cy="40" rx="6" ry="3" fill="#ffe8a0" opacity="0.85" filter="url(#glow-tiny)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite" />
  </ellipse>

  <!-- Distant car headlights on the road -->
  <ellipse cx="838" cy="618" rx="9" ry="4" fill="#fff0c0" opacity="0.85" filter="url(#glow-soft)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.4s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="855" cy="620" rx="6" ry="3" fill="#fff0c0" opacity="0.7" filter="url(#glow-tiny)">
    <animate attributeName="opacity" values="0.7;0.95;0.7" dur="2.4s" repeatCount="indefinite" />
  </ellipse>

  <!-- Car taillights right (red) -->
  <ellipse cx="1196" cy="592" rx="4" ry="3" fill="#ff4040" opacity="0.85" filter="url(#glow-tiny)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.7s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="1218" cy="594" rx="4" ry="3" fill="#ff4040" opacity="0.85" filter="url(#glow-tiny)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.7s" repeatCount="indefinite" />
  </ellipse>

  <!-- Sparse window pulses across distant skyline (life effect) -->
  <g fill="#ffd080">
    <rect x="745" y="500" width="3" height="3">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.1s" repeatCount="indefinite" />
    </rect>
    <rect x="780" y="450" width="3" height="3">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite" />
    </rect>
    <rect x="930" y="430" width="3" height="3">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.6s" repeatCount="indefinite" />
    </rect>
    <rect x="1010" y="380" width="3" height="3">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="2.9s" repeatCount="indefinite" />
    </rect>
    <rect x="1170" y="340" width="3" height="3">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.3s" repeatCount="indefinite" />
    </rect>
    <rect x="1230" y="280" width="3" height="3">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.1s" repeatCount="indefinite" />
    </rect>
    <rect x="700" y="380" width="3" height="3">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.7s" repeatCount="indefinite" />
    </rect>
    <rect x="600" y="360" width="3" height="3">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite" />
    </rect>
    <rect x="1240" y="430" width="3" height="3">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Cyan window pulses (sparser) -->
  <g fill="#80e0f0">
    <rect x="822" y="490" width="3" height="3">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4.1s" repeatCount="indefinite" />
    </rect>
    <rect x="1060" y="460" width="3" height="3">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Subtle drifting rain hint (vertical) -->
  <g stroke="rgba(200,210,220,0.18)" stroke-width="0.5" stroke-linecap="round">
    <line x1="200" y1="100" x2="195" y2="120" />
    <line x1="350" y1="80" x2="345" y2="100" />
    <line x1="500" y1="120" x2="495" y2="140" />
    <line x1="650" y1="90" x2="645" y2="110" />
    <line x1="800" y1="110" x2="795" y2="130" />
    <line x1="950" y1="80" x2="945" y2="100" />
    <line x1="1100" y1="120" x2="1095" y2="140" />
  </g>
</svg>
